# config.yaml
# @file    config.yaml
# @author  Anthony Yalong
# @nuid    002156860
# @brief   Central configuration for the voice interaction system.
#          Contains model paths and inference settings for ASR, LLM, and TTS.
#          Designed for macOS Apple Silicon (Metal backend).

llm:
  model_path: models/Qwen2.5-7B-Instruct-Q4_K_M.gguf
  n_ctx: 2048
  n_threads: 8
  n_gpu_layers: 35
  max_tokens: 512

asr:
  model: small
  language: en
  fp16: false

tts:
  voice: af_heart
  sample_rate: 24000

pipeline:
  log_timings: true